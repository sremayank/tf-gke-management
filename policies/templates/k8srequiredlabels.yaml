apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8srequiredlabels
spec:
  crd:
    spec:
      names:
        kind: K8sRequiredLabels
      validation:
        openAPIV3Schema:
          type: object
          properties:
            labels:
              type: array
              items:
                type: object
                properties:
                  key:
                    type: string
                  allowedRegex:
                    type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8srequiredlabels

        violation[{"msg": msg}] {
          required := input.parameters.labels[_]
          value := input.review.object.metadata.labels[required.key]
          not value
          msg := sprintf("missing required label %q", [required.key])
        }

        violation[{"msg": msg}] {
          required := input.parameters.labels[_]
          value := input.review.object.metadata.labels[required.key]
          value
          not regex.match(required.allowedRegex, value)
          msg := sprintf("label %q has invalid value %q", [required.key, value])
        }
